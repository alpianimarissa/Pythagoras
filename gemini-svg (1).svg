<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" style="background-color: #f4f4f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <text x="400" y="40" font-size="26" font-weight="bold" fill="#333" text-anchor="middle">Visualisasi Soal Pythagoras (Lanjutan)</text>
  <line x1="50" y1="55" x2="750" y2="55" stroke="#ccc" stroke-width="1"/>

  <g transform="translate(50, 70)">
    <rect width="700" height="210" rx="10" fill="#fff" stroke="#eee" stroke-width="1"/>
    <text x="15" y="25" font-size="18" font-weight="bold" fill="#0056b3">Soal 8: Jarak Dua Titik Koordinat</text>
    <text x="15" y="50" font-size="12" fill="#555">Jarak A(-3, 4) ke B(x, -8) adalah 13 satuan.</text>

    <g transform="translate(130, 70)">
      <line x1="-40" y1="50" x2="160" y2="50" stroke="#aaa" stroke-width="1"/>
      <line x1="40" y1="-10" x2="40" y2="120" stroke="#aaa" stroke-width="1"/>
      
      <circle cx="10" cy="10" r="4" fill="#0056b3"/>
      <text x="-15" y="5" font-size="12" fill="#0056b3">A(-3,4)</text>
      
      <circle cx="130" cy="110" r="4" fill="#2e7d32"/>
      <text x="140" y="115" font-size="12" fill="#2e7d32">B(2,-8)</text>
      
      <line x1="10" y1="10" x2="130" y2="110" stroke="#fbc02d" stroke-width="3"/>
      <text x="75" y="50" font-size="12" font-weight="bold" fill="#c49000">Jarak = 13</text>
      
      <line x1="10" y1="10" x2="10" y2="110" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="3,3"/>
      <line x1="10" y1="110" x2="130" y2="110" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="3,3"/>
      
      <text x="-40" y="65" font-size="11" fill="#d32f2f">Δy = 4 - (-8) = 12</text>
      <text x="70" y="125" font-size="11" fill="#d32f2f" text-anchor="middle">Δx = |x - (-3)|</text>
    </g>

    <g transform="translate(450, 45)" font-size="12" fill="#333">
      <text x="0" y="15" font-weight="bold">Langkah:</text>
      <text x="10" y="35">1. Rumus Jarak: d² = (Δx)² + (Δy)²</text>
      <text x="10" y="55">2. 13² = (x - (-3))² + (4 - (-8))²</text>
      <text x="10" y="75">3. 169 = (x + 3)² + 12²</text>
      <text x="10" y="95">4. 169 = (x + 3)² + 144</text>
      <text x="10" y="115">5. (x + 3)² = 25  →  x + 3 = ±5</text>
      <text x="10" y="135">   • x = 5 - 3 = 2</text>
      <text x="10" y="155">   • x = -5 - 3 = -8</text>
      <rect x="10" y="165" width="160" height="25" rx="5" fill="#e8f5e9"/>
      <text x="90" y="182" font-size="13" font-weight="bold" fill="#2e7d32" text-anchor="middle">Jawaban: x = 2 atau x = -8</text>
    </g>
  </g>

  <g transform="translate(50, 300)">
    <rect width="700" height="210" rx="10" fill="#fff" stroke="#eee" stroke-width="1"/>
    <text x="15" y="25" font-size="18" font-weight="bold" fill="#c62828">Soal 9: Nilai x pada Sisi Segitiga PQR</text>
    <text x="15" y="50" font-size="12" fill="#555">Siku-siku di Q. Sisi: PQ=2x, QR=2x+2, PR=4x-2.</text>

    <g transform="translate(130, 80)">
      <path d="M 0 80 L 140 80 L 0 0 Z" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
      <text x="-15" y="5" font-size="14" fill="#333" font-weight="bold">P</text>
      <text x="-15" y="95" font-size="14" fill="#333" font-weight="bold">Q</text>
      <text x="145" y="95" font-size="14" fill="#333" font-weight="bold">R</text>
      
      <text x="-40" y="45" font-size="12" fill="#c62828">2x</text>
      <text x="70" y="95" font-size="12" fill="#c62828" text-anchor="middle">2x + 2</text>
      <text x="80" y="35" font-size="12" fill="#c62828" transform="rotate(-30 80 35)">4x - 2</text>
      
      <path d="M 0 70 L 10 70 L 10 80" fill="none" stroke="#333" stroke-width="1"/>
    </g>

    <g transform="translate(450, 45)" font-size="12" fill="#333">
      <text x="0" y="15" font-weight="bold">Langkah (Uji Pilihan Ganda):</text>
      <text x="10" y="35">Paling cepat uji nilai x dari pilihan:</text>
      <text x="10" y="55" font-weight="bold" fill="#c62828">Jika x = 3:</text>
      <text x="20" y="75">• PQ = 2(3) = 6 cm</text>
      <text x="20" y="95">• QR = 2(3) + 2 = 8 cm</text>
      <text x="20" y="115">• PR = 4(3) - 2 = 10 cm</text>
      <text x="10" y="135">Angka 6, 8, 10 adalah Tripel Pythagoras</text>
      <text x="10" y="155">terbukti sah (6² + 8² = 10² → 36 + 64 = 100).</text>
      <rect x="10" y="165" width="160" height="25" rx="5" fill="#ffebee"/>
      <text x="90" y="182" font-size="14" font-weight="bold" fill="#b71c1c" text-anchor="middle">Jawaban: x = 3</text>
    </g>
  </g>

  <g transform="translate(50, 530)">
    <rect width="700" height="230" rx="10" fill="#fff" stroke="#eee" stroke-width="1"/>
    <text x="15" y="25" font-size="18" font-weight="bold" fill="#2e7d32">Soal 10: Jarak Titik Ke Garis Diagonal Kubus</text>
    <text x="15" y="50" font-size="12" fill="#555">Kubus rusuk 10 cm. Jarak terdekat titik A ke garis CF.</text>

    <g transform="translate(130, 60) scale(0.9)">
      <rect x="40" y="0" width="100" height="100" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="0" y1="40" x2="40" y2="0" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="100" y1="140" x2="140" y2="100" stroke="#333" stroke-width="1.5"/>
      
      <rect x="0" y="40" width="100" height="100" fill="none" stroke="#333" stroke-width="1.5"/>
      <line x1="100" y1="40" x2="140" y2="0" stroke="#333" stroke-width="1.5"/>
      <line x1="0" y1="140" x2="40" y2="100" stroke="#ccc" stroke-width="1" stroke-dasharray="3,3"/>
      
      <text x="-12" y="150" font-size="12" font-weight="bold" fill="#0056b3">A</text>
      <text x="105" y="150" font-size="12">B</text>
      <text x="145" y="110" font-size="12" fill="#2e7d32">C</text>
      <text x="45" y="112" font-size="12">D</text>
      <text x="-12" y="50" font-size="12">E</text>
      <text x="105" y="50" font-size="12" fill="#2e7d32">F</text>
      <text x="145" y="10" font-size="12">G</text>
      <text x="45" y="10" font-size="12">H</text>

      <line x1="0" y1="140" x2="140" y2="100" stroke="#2e7d32" stroke-width="2"/> <line x1="140" y1="100" x2="100" y2="40" stroke="#2e7d32" stroke-width="2"/> <line x1="100" y1="40" x2="0" y2="140" stroke="#2e7d32" stroke-width="2"/> <line x1="0" y1="140" x2="120" y2="70" stroke="#d32f2f" stroke-width="2.5"/>
      <text x="50" y="90" font-size="13" font-weight="bold" fill="#d32f2f">Jarak = ?</text>
    </g>

    <g transform="translate(450, 45)" font-size="12" fill="#333">
      <text x="0" y="15" font-weight="bold">Langkah:</text>
      <text x="10" y="35">1. Garis AC, CF, dan AF adalah diagonal bidang.</text>
      <text x="20" y="50">Semuanya bernilai s√2 = 10√2 cm.</text>
      <text x="10" y="70">2. Segitiga ACF berbentuk <tspan font-weight="bold">Sama Sisi</tspan>.</text>
      <text x="10" y="90">3. Jarak A ke CF adalah tinggi segitiga ini.</text>
      <text x="10" y="110">4. Gunakan rumus tinggi segitiga sama sisi:</text>
      <text x="20" y="130" font-weight="bold" fill="#2e7d32">Tinggi = ½ × Sisi × √3</text>
      <text x="20" y="150">Tinggi = ½ × (10√2) × √3</text>
      <text x="20" y="170">Tinggi = 5 × √(2×3) = 5√6 cm.</text>
      <rect x="10" y="185" width="160" height="25" rx="5" fill="#e8f5e9"/>
      <text x="90" y="202" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">Jawaban: 5√6 cm</text>
    </g>
  </g>
</svg>
